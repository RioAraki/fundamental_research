# 中国棕榈油期货(DCE P)基本面因果知识图谱 · 事实源(KG-as-code)
# 设计理念:
#   1. 根因定性、新闻和数据定量;
#   2. 根因节点一律用【中性状态量】命名(如"印度进口关税"而非"印度加税")——
#      图谱只存传导【机制】(边的极性),事件的【方向】由当下新闻/现实决定,推理时以 ±1 冲击输入;
#   3. 每个根因带 direction(+/− 的语义)与 signals(监测新闻关键词+数据源)。
# 边五要素:polarity(+/-) · lag · strength(强/中/弱) · condition · evidence。
# polarity 语义:起点数值"上升"时对终点的影响方向。
meta:
  commodity: 棕榈油(DCE P)
  version: "0.2"
  updated: "2026-07-02"
  标的: "大商所棕榈油期货:RBD 棕榈液油,熔点≤24℃;基准交割地广东;主力 1/5/9"
  定价链: "印马产地 → BMD FCPO → 进口成本/进口利润 → 买船到港 → 港口库存与基差 → DCE P"

nodes:
  # ══════ 根因 · 供给侧(中性状态量) ══════
  - id: 产区干旱程度
    type: 根因·天气
    direction: "+ = 干旱加剧(厄尔尼诺情形) / − = 降水改善"
    note: "干旱→油棕水分胁迫→单产下降,滞后 6-24 个月(花序分化在结果前 2 年)"
    case: "2015-16 强El Niño→2016马来产量-13%;2023宣布后预期炒作、被高库存证伪"
    signals:
      news: [厄尔尼诺, "El Niño", ONI, "dry spell", 产区干旱]
      data: ["NOAA CPC ENSO 月度展望", "澳 BOM ENSO Wrap-Up(双周)", "MPOB 月度单产(每月10日)"]
  - id: 产区降雨水平
    type: 根因·天气
    direction: "+ = 降雨偏多/洪涝(拉尼娜情形) / − = 降雨偏少"
    note: "过量降雨→采收运输受阻(短期减产);适度充沛降雨利 6-12 月后单产(中期增产)——同一根因两条异号路径"
    case: "2021 末马来东海岸洪水;2020-22 三年拉尼娜"
    signals:
      news: [拉尼娜, "La Niña", 洪涝, 马来西亚东海岸洪水, monsoon]
      data: ["MPOB 月报分州产量", "SPPOMA 旬度单产"]
  - id: 马来劳工供给
    type: 根因·供给
    direction: "+ = 劳工充足 / − = 短缺(封边、配额收紧)"
    note: "85% 庄园劳动力为外劳;缺工→熟果无人采"
    case: "2021 缺工 7.5 万人(冲击方向 −),MPOA 估算全年潜在损失 450 万吨 CPO;2022 放开入境后恢复"
    signals:
      news: [外劳短缺, "labour shortage", 收割工, 招工配额]
      data: ["MPOA/MPOB 声明", "马来内政部外劳审批", "MPOB 产量 vs 历史同期"]
  - id: 树龄老化程度
    type: 根因·结构
    direction: "+ = 老化加剧(翻种不足) / − = 翻种提速、树龄结构改善"
    note: "油棕 7-14 年盛产、19 年后衰退;马来约 30% 树龄将超 19 年,翻种率仅 1-2%(需 4-5%)"
    case: "2019 后马来单产停滞 3.2-3.5 吨/公顷,是 2020s 供给紧的慢背景"
    signals:
      news: [树龄老化, replanting, 翻种补贴, PSR]
      data: ["MPOB 年度面积/树龄结构", "全球棕榈油大会纪要"]
  - id: 化肥投入水平
    type: 根因·供给
    direction: "+ = 正常/加大施肥 / − = 减施(化肥涨价、现金流差)"
    note: "施肥变化影响 1-2 年后单产"
    case: "2021-22 化肥翻倍+缺工减施(−),致 2022-23 马来单产迟迟不恢复"
    signals:
      news: [化肥价格, "fertiliser application", 钾肥 MOP]
      data: ["世界银行化肥价格指数(月)", "IOI/KLK/Sime Darby 季报施肥成本"]
  - id: 印尼园地整顿力度
    type: 根因·政策
    direction: "+ = 整顿/没收收紧 / − = 放松"
    note: "2025 年查没约 330 万公顷违规园地(约占面积 19%)→管理中断→产量预期下修"
    case: "USDA 因此将 2025/26 印尼产量下修至 4670 万吨"
    signals:
      news: [Agrinas, 没收种植园, "forest area palm confiscation"]
      data: ["USDA FAS GAIN Jakarta 报告"]
  - id: 季节性产量周期
    type: 根因·季节
    direction: "+ = 进入增产季(9-10 月为顶) / − = 进入减产季(11-2 月,2 月最低)"
    note: "东南亚产量天然季节形态;Q1 减产+备货共振常成年内高点"
    case: "2021/2024/2025 年 Q1 均现年内高点"
    signals:
      news: [减产季, 增产季, 季节性]
      data: ["MPOB 月报产量环比", "SPPOMA 旬度(每 10-15 天)"]

  # ══════ 根因 · 政策侧(中性状态量) ══════
  - id: 印尼出口限制力度
    type: 根因·政策
    direction: "+ = 收紧(DMO 加码/禁令) / − = 放开(取消限制/flush out 冲出口)"
    note: "印尼占全球出口 55-60%;自带'收紧→胀库→被迫放开'反身回路,双向都发生过"
    case: "2022.4.22 禁令(+)当晚 P2209 夜盘涨 6.9%;2022.6-7 flush out(−)FCPO 两月 -45%"
    signals:
      news: [印尼出口禁令, "export ban", DMO, DPO, 食用油限价, "flush out"]
      data: ["印尼贸易部 Kemendag 法规", "GAPKI 月度库存/出口(滞后约2月)", "印尼 FFB 收购价"]
  - id: 印尼出口levy税率
    type: 根因·政策
    direction: "+ = levy/出口税上调 / − = 下调或豁免"
    note: "levy 抬升印尼 FOB 成本;levy 收入又是 B40 补贴资金来源"
    case: "2025.5 CPO levy 7.5%→10%(+);2022.7 levy 豁免(−)加速下半年暴跌"
    signals:
      news: ["export levy", BPDPKS, 出口税, HPE 参考价]
      data: ["印尼财政部 PMK 法规", "每月 HPE 参考价与税档"]
  - id: 印尼生柴掺混率
    type: 根因·政策
    direction: "+ = 掺混上调/如期推进(B40→B50) / − = 推迟或执行率不及预期"
    note: "掺混每+5 个点≈多吃 150-200 万吨出口量,近年最大边际需求变量;看三因子:掺混率×执行率×补贴资金"
    case: "2024 年 B40 预期(+)驱动 P 全年涨 22.6%;B50 推迟(−)即回吐"
    signals:
      news: [B40, B50, "biodiesel mandate", 掺混率, FAME 配额, BPDPKS 补贴缺口]
      data: ["印尼能源部 ESDM 配额公告", "APROBI 月度生柴产量", "GAPKI 国内消费"]
  - id: 马来出口税率
    type: 根因·政策
    direction: "+ = 上调 / − = 下调"
    note: "CPO 出口税随参考价阶梯浮动(约 3-10%),影响弱于印尼政策"
    signals:
      news: ["Malaysia CPO export duty", 参考价]
      data: ["MPOB 每月公布下月税率"]
  - id: 印度进口关税
    type: 根因·政策
    direction: "+ = 加税 / − = 降税"
    note: "印度是第一大进口国(约 800 万吨/年);毛油 vs 精炼油税差还决定采购结构"
    case: "2024.9 加税(+)后炼厂取消 10 万吨订单;2025.5 降税(−)刺激进口"
    signals:
      news: [印度进口关税, "basic customs duty", AIDC, CBIC notification]
      data: ["印度财政部通告", "SEA of India 月度进口(每月中旬)"]
  - id: EUDR执行力度
    type: 根因·政策
    direction: "+ = 如期收紧执行 / − = 延期或放松"
    note: "欧盟零毁林法规,合规成本+10-15%;欧盟占棕油出口约 9-10%"
    signals:
      news: [EUDR, "deforestation-free", 尽职调查]
      data: ["欧委会官网进展(大企业 2026.12.30 起)"]
  - id: 消费国生柴掺混政策
    type: 根因·政策
    direction: "+ = 消费国上调掺混 / − = 下调(高价引发的政策反噬)"
    note: "泰国/印度等消费国的掺混政策,自带对高价的负反馈"
    case: "2024.11.14 泰国 B7→B5(−),连棕高位急跌破 9500"
    signals:
      news: [泰国 B7 B5, 生物柴油掺混]
      data: ["泰国能源部公告"]

  # ══════ 根因 · 需求/宏观侧(中性状态量) ══════
  - id: 原油价格
    type: 根因·宏观
    direction: "+ = 油价上涨 / − = 下跌"
    note: "宏观 beta + 生柴经济性(POGO)双通道"
    signals:
      news: [OPEC, 原油]
      data: ["Brent/ICE 柴油(日)", "Platts POGO 评估(日)"]
  - id: 美国生柴掺混义务
    type: 根因·政策
    direction: "+ = EPA 上调 RVO/收紧 45Z / − = 下调或放松"
    note: "拉动美豆油生柴需求→抬升全球油脂比价→经豆棕价差传导"
    case: "2025.6 EPA 提案 2026 年 D4 义务 +67%;2026.1 与产量缺口共振引发棕油逼空"
    signals:
      news: [RVO, EPA, "D4 RIN", 45Z, 可再生柴油]
      data: ["EPA 法规日程", "RIN 价格(OPIS)"]
  - id: 南美大豆产量
    type: 根因·供给
    direction: "+ = 丰产 / − = 减产(干旱等)"
    note: "巴西/阿根廷丰歉→豆油价格→豆棕比价"
    signals:
      news: [巴西大豆, 阿根廷大豆, 南美天气]
      data: ["USDA WASDE(月)", "CONAB"]
  - id: 黑海葵油供应
    type: 根因·宏观
    direction: "+ = 供应正常/恢复 / − = 断供(战争、港口封锁)"
    note: "俄乌占全球葵油出口约 78%;断供时买家转向棕油/豆油"
    case: "2022.2-3 俄乌开战断供(−),棕油一度成四大油中最贵,年内涨 27.9%"
    signals:
      news: [黑海, 葵花籽油出口, 乌克兰港口, 俄葵油配额]
      data: ["UkrAgroConsult", "APK-Inform"]
  - id: 印度节日备货强度
    type: 根因·季节
    direction: "+ = 备货旺(斋月前 1-3 月、排灯节前 8-10 月) / − = 备货结束/缺席"
    note: "备货力度受印度国内库存与进口利润制约,无价差优势时改买豆油"
    case: "2025.1 印度进口 27.5 万吨创 13 年新低(−),随后斋月补库(+)支撑 Q1"
    signals:
      news: [斋月备货, "Ramadan stocking", Diwali, "festive demand"]
      data: ["SEA 月度进口", "ITS/AmSpec 半月出口中的印度装船"]
  - id: 中国餐饮食品需求
    type: 根因·需求
    direction: "+ = 需求走强 / − = 走弱"
    note: "中国棕油约 90% 食用(方便面/煎炸/烘焙);弹性有限,更多影响基差与月差"
    signals:
      news: [餐饮收入, 方便面产量]
      data: ["统计局社零餐饮(月)", "钢联油脂成交与提货(日/周)"]
  - id: 油脂化工需求
    type: 根因·需求
    direction: "+ = 日化/油化景气(硬脂酸、脂肪醇、表面活性剂订单旺) / − = 走弱"
    note: "拉动的主要是棕榈硬脂与棕榈仁油(合计约占中国棕榈系进口 1/4-1/3),而非 DCE P 标的的 24 度液油;通过分提经济性与整体采购间接影响液油"
    case: "疫情期间洗涤剂需求激增拉动硬脂,但对 P 盘面影响有限"
    signals:
      news: [硬脂酸, 表面活性剂, 油化开工]
      data: ["油化企业开工率(钢联)", "硬脂-液油价差"]
  - id: 全球食用消费趋势
    type: 根因·需求
    direction: "+ = 人口与食品工业增长(印度/非洲/东南亚) / − = 健康与声誉逆风(饱和脂肪担忧、EUDR 标签)"
    note: "慢变量:棕榈油是全球最大食用植物油,人均消费增长集中在新兴市场"
    signals:
      news: [食用油消费, "palm oil consumption"]
      data: ["USDA 全球消费平衡表", "OECD-FAO 农业展望"]
  - id: 人民币汇率USDCNY
    type: 根因·宏观
    direction: "+ = 人民币贬值(USDCNY 上行) / − = 升值"
    note: "贬值→进口成本抬升→DCE 相对外盘走强、进口利润恶化"
    signals: {news: [人民币汇率], data: ["USDCNY(日)"]}
  - id: 林吉特汇率USDMYR
    type: 根因·宏观
    direction: "+ = 林吉特贬值(USDMYR 上行) / − = 升值"
    note: "贬值→FCPO 以令吉计价被动抬升 + 马来出口竞争力改善"
    signals: {news: [林吉特, ringgit], data: ["USDMYR(日)"]}

  # ══════ 根因 · 市场侧(中性状态量) ══════
  - id: MPOB库存预期差
    type: 根因·市场
    direction: "+ = 实际库存高于调查预期 / − = 低于预期"
    note: "每月 10 日 12:30 发布;交易的不是绝对数而是相对路透/彭博调查中值的预期差"
    case: "2025.11 预期库存增至 6 年半高位(+),FCPO 提前承压;低于预期(−)当日拉涨"
    signals:
      news: ["MPOB survey", 路透调查, 库存预估]
      data: ["路透/彭博赛前调查(每月5-8日)", "MPOB BEPI 官网"]
  - id: 资金净多持仓
    type: 根因·市场
    direction: "+ = 净多增仓 / − = 净多减仓或转空"
    note: "低库存+题材共振时易逼仓;宏观 risk-off 则普跌带崩"
    case: "2026.1 产量缺口+美生柴新政引发逼空行情(+)"
    signals:
      news: [逼空, 基金净多, 多头增仓]
      data: ["DCE 每日持仓排名", "BMD 持仓"]

  # ══════ 中间变量 ══════
  - {id: FFB单产, type: 供给指标, note: "鲜果串单产,天气/树龄/化肥的汇聚点;滞后效应长"}
  - {id: 马来产量, type: 供给指标, note: "约 1950 万吨/年,占全球 24%;数据透明度最高"}
  - {id: 印尼产量, type: 供给指标, note: "约 4700 万吨/年,占全球 57%;数据滞后约 2 个月"}
  - {id: MPOB库存, type: 供给指标, note: "马来月度库存,全球价格晴雨表;每月 10 日发布"}
  - {id: 印尼国内库存, type: 供给指标, note: "胀库会倒逼出口政策放开(2022 flush out)"}
  - {id: 印尼生柴需求, type: 需求指标, note: "B40 年耗约 1390 万吨,政策+POGO 双驱动"}
  - {id: 全球可出口供给, type: 供给指标, note: "印马产量 − 印尼国内消耗 − 政策限制"}
  - {id: POGO价差, type: 价差, note: "棕油-柴油价差;<0 时自主掺混盈利"}
  - {id: CBOT豆油价格, type: 替代品, note: "美豆油,全球油脂比价锚之一"}
  - {id: 豆棕价差, type: 价差, note: "Y-P 主力价差;传统 P 贴水 Y,倒挂即需求破坏信号"}
  - {id: 棕油替代需求, type: 需求指标, note: "价差驱动的食用配方切换(中包装油掺兑)"}
  - {id: 印度进口需求, type: 需求指标, note: "第一大买家,关税与节日双驱动"}
  - {id: 天气升水情绪, type: 情绪, note: "ENSO 宣布日的预期计价,与实际减产是两段行情"}
  - {id: FCPO价格, type: 价格, note: "BMD 毛棕榈油期货(令吉/吨),全球 CPO 定价锚"}
  - {id: 进口成本, type: 价格, note: "FOB+运费×汇率×(1+9%增值税)=到港完税成本"}
  - {id: 进口利润, type: 价差, note: "DCE 盘面 − 进口成本;常态深度倒挂"}
  - {id: 中国买船, type: 需求指标, note: "周度买船成交;船期 6-10 周后到港"}
  - {id: 中国港口库存, type: 供给指标, note: "华南广州+华东张家港+华北天津,周度(钢联)"}
  - {id: DCE棕榈油价格, type: 价格, note: "P 主力;2022 高点 1.2万+,2024 涨 22.6% 站上万元"}

edges:
  # ── 天气/结构 → 单产/产量 ──
  - {from: 产区干旱程度, to: FFB单产, polarity: "-", lag: 6-24月, strength: 强,
     condition: "ONI≥+1.0 持续 3 个月以上时显著", evidence: "长江期货 ENSO-单产滞后研究;2015-16 案例"}
  - {from: 产区干旱程度, to: 天气升水情绪, polarity: "+", lag: 当日, strength: 中,
     condition: "低库存时放大;高库存下易证伪(2023)", evidence: "2023.6 NOAA 宣布后 P 反弹 6800→8000+"}
  - {from: 天气升水情绪, to: DCE棕榈油价格, polarity: "+", lag: 数日, strength: 中,
     evidence: "2023 天气升水 Q4 回吐,预期与兑现是两段行情"}
  - {from: 产区降雨水平, to: 马来产量, polarity: "-", lag: 0-3月, strength: 中,
     condition: "降雨过量成灾(东海岸/沙巴洪涝)才成立", evidence: "2021 末马来东海岸洪水"}
  - {from: 产区降雨水平, to: FFB单产, polarity: "+", lag: 6-12月, strength: 中,
     condition: "适度充沛降雨、未成灾", evidence: "9 次拉尼娜中 6 次先减后增"}
  - {from: 马来劳工供给, to: 马来产量, polarity: "+", lag: 1-6月, strength: 强,
     evidence: "2021 缺工(−)潜在损失 450 万吨;2022 放开入境(+)产量恢复"}
  - {from: 树龄老化程度, to: FFB单产, polarity: "-", lag: 3-10年, strength: 中,
