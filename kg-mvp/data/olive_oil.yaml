# 橄榄油基本面因果知识图谱 · 事实源(KG-as-code)
# 边五要素:polarity(+/-) · lag(时滞) · strength(强/中/弱) · condition(生效条件) · evidence(溯源)
# polarity 语义:起点"增加/发生"时,对终点的影响方向。+ 同向,- 反向。
meta:
  commodity: 橄榄油
  version: "0.1"
  updated: "2026-07-02"
  price_benchmark: "西班牙 Jaén ex-mill(€/kg)/ 国际报价(USD/t)"
